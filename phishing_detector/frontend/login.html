<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafeBrowse - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="page-bg"></div>

  <div class="login-shell">
    <a href="index.html" class="back-link">← Back to SafeBrowse</a>

    <div class="login-card">

      <div class="logo-card">
        <span class="logo-icon">🛡️</span>
        <span class="logo-text">SafeBrowse</span>
      </div>

      <!-- Tabs -->
      <div class="toggle-buttons">
        <button id="signInTab" class="tab active" onclick="switchAuth('signIn')">Sign In</button>
        <button id="registerTab" class="tab" onclick="switchAuth('register')">Register</button>
      </div>

      <h1 id="authTitle">Welcome back</h1>
      <p id="authSubtitle">Sign in to your account</p>

      <!-- SIGN IN -->
      <div id="signInForm" class="auth-form">
        <input type="email" placeholder="Email" id="signInEmail" />
        <input type="password" placeholder="Password" id="signInPassword" />
        <button type="button" onclick="signInUser()">Log in</button>

        <p class="forgot-pw-link">
          <a href="#" onclick="switchAuth('forgotPassword'); return false;">
            Forgot Password?
          </a>
        </p>
      </div>

      <!-- REGISTER -->
      <div id="registerForm" class="auth-form hidden">
        <input type="text" placeholder="Username" id="registerUsername" />
        <input type="email" placeholder="Email" id="registerEmail" />
        <input type="password" placeholder="Password" id="registerPassword" />
        <input type="password" placeholder="Confirm Password" id="registerConfirm" />
        <button type="button" onclick="registerUser()">Create account</button>
      </div>

      <!-- FORGOT PASSWORD -->
      <div id="forgotPasswordForm" class="auth-form hidden">
        <p class="form-description">Verify your identity to reset password</p>

        <div id="forgotStep1">
          <input type="email" placeholder="Email" id="forgotEmail" />
          <input type="text" placeholder="Username" id="forgotUsername" />
          <button type="button" onclick="verifyUserIdentity()">Verify Identity</button>
        </div>

        <div id="forgotStep2" class="hidden">
          <p class="verification-success">✓ Identity verified</p>
          <input type="password" placeholder="New Password" id="newPassword" />
          <input type="password" placeholder="Confirm New Password" id="confirmNewPassword" />
          <button type="button" onclick="resetPassword()">Reset Password</button>
        </div>
      </div>

      <p class="privacy-note">
        By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
      </p>
    </div>
  </div>

  <script>
    // ================= SWITCH BETWEEN FORMS =================
    function switchAuth(mode) {
      document.getElementById('signInTab').classList.toggle('active', mode === 'signIn');
      document.getElementById('registerTab').classList.toggle('active', mode === 'register');

      document.getElementById('signInForm').classList.toggle('hidden', mode !== 'signIn');
      document.getElementById('registerForm').classList.toggle('hidden', mode !== 'register');
      document.getElementById('forgotPasswordForm').classList.toggle('hidden', mode !== 'forgotPassword');

      const authTitleNode = document.getElementById('authTitle');
      const authSubtitleNode = document.getElementById('authSubtitle');

      if (mode === 'signIn') {
        authTitleNode.innerText = 'Welcome back';
        authSubtitleNode.innerText = 'Sign in to your account';
      } else if (mode === 'register') {
        authTitleNode.innerText = 'Create an account';
        authSubtitleNode.innerText = 'Enter your details below';
      } else {
        authTitleNode.innerText = 'Reset Password';
        authSubtitleNode.innerText = 'Verify your identity';
      }
    }

    // ================= SIGN IN =================
    function signInUser() {
      const email = document.getElementById('signInEmail').value.trim();
      const password = document.getElementById('signInPassword').value;

      const users = JSON.parse(localStorage.getItem('safeBrowseUsers') || '[]');

      const user = users.find(u => u.email === email);

      if (!user) {
        alert("User not found");
        return;
      }

      if (user.password !== password) {
        alert("Incorrect password");
        return;
      }

      localStorage.setItem("safeBrowseLoggedIn", "true");
      localStorage.setItem("safeBrowseUser", user.username);

      window.location.href = "index.html";
    }

    // ================= REGISTER =================
    function registerUser() {
      const username = document.getElementById('registerUsername').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value;
      const confirm = document.getElementById('registerConfirm').value;

      if (!username || !email || !password || !confirm) {
        alert("Fill all fields");
        return;
      }

      if (password !== confirm) {
        alert("Passwords do not match");
        return;
      }

      let users = JSON.parse(localStorage.getItem('safeBrowseUsers') || '[]');

      if (users.some(u => u.email === email)) {
        alert("Email already exists");
        return;
      }

      users.push({ username, email, password });

      localStorage.setItem('safeBrowseUsers', JSON.stringify(users));

      localStorage.setItem("safeBrowseLoggedIn", "true");
      localStorage.setItem("safeBrowseUser", username);

      window.location.href = "index.html";
    }

    // ================= VERIFY USER =================
    function verifyUserIdentity() {
      document.getElementById('forgotStep1').classList.add('hidden');
      document.getElementById('forgotStep2').classList.remove('hidden');
    }

    // ================= RESET PASSWORD =================
    function resetPassword() {
      alert("Password reset (demo)");
      switchAuth('signIn');
    }

    // ================= PREVENT ACCESS WHEN LOGGED IN =================
    window.onload = () => {
      if (localStorage.getItem("safeBrowseLoggedIn") === "true") {
        window.location.href = "index.html";
      }
    };
  </script>
</body>
</html>
